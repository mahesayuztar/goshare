<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Simple Form</title>
</head>
<body>
    <div class="d-flex flex-column form-control align-items-center w-100 mt-5">
        <h2 class="text-center">Terima kasih sudah menggunakan aplikasi ini!</h2>
        {{if .Download}}
        <h5 class="text-center">File Anda telah berhasil diunduh.</h5>
        {{else if .FileID}}
        <h5 class="text-center">File Anda telah berhasil diunggah.<br>URL untuk download file anda adalah: <a href="/download/{{.FileID}}" target="_blank">/download/{{.FileID}}</a></h5>
        {{end}}

    </div>
</body> 
</html>
