<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Simple Form</title>
</head>
<body>
    <div class="d-flex flex-column form-control align-items-center w-100">
        <form enctype="multipart/form-data" action="/submit" method="post">
            <div class="d-flex flex-row">
                <div class="d-flex flex-column align-items-start">
                    <label for="url" class="form-label">URL:</label>
                    <div class="d-flex flex-row align-items-start gap-1">
                        <p>goshare.com/</p>
                        <input type="text" id="url" name="url" class="form-control w-100" required>
                    </div>
                    <label for="file" class="form-label">Upload File:</label>
                    <input type="file" id="file" name="file" class="form-control w-100" required>
                    {{if .Error}}
                    <div class="alert alert-danger mt-2" role="alert">
                        {{.Error}}
                    </div>
                    {{end}}
                </div>
            </div>
            <button type="submit" class="btn btn-primary mt-3">Submit</button>
        </form>
    </div>
</body> 
</html>
